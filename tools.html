<main>
  <h2>Flare Risk Predictor</h2>
  <button id="predictRiskBtn">Predict Today’s Flare Risk</button>
  <p id="riskOutput"></p>
</main>

<script>
document.getElementById('predictRiskBtn').addEventListener('click', function() {
  const logs = JSON.parse(localStorage.getItem('dailyLogs')) || [];
  if(logs.length === 0){
    alert("No logs yet. Go to Dashboard and add a daily log first.");
    return;
  }
  const lastLog = logs[logs.length-1];
  let risk = 0;
  if(lastLog.sleep < 6) risk += 2;
  if(lastLog.stress > 7) risk += 3;
  risk = Math.min(risk, 10);
  document.getElementById('riskOutput').innerText = `Today's flare risk: ${risk}/10`;
});
</script>
